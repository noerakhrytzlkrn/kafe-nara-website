<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Reservasi - Nara Café</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#F8F4EE;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.reservasi-box{
    width:100%;
    max-width:500px;
    background:white;
    padding:35px;
    border-radius:25px;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.back-btn{
    display:inline-block;
    margin-bottom:20px;
    text-decoration:none;
    color:#3E2723;
    font-weight:600;
}

h2{
    text-align:center;
    color:#3E2723;
    margin-bottom:25px;
}

.input-group{
    margin-bottom:18px;
}

.input-group label{
    display:block;
    margin-bottom:8px;
    color:#555;
}

.input-group input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:12px;
    font-size:14px;
}

.input-group input:focus{
    outline:none;
    border-color:#C67C4E;
}

.btn-reservasi{
    width:100%;
    padding:14px;
    border:none;
    border-radius:15px;
    background:#C67C4E;
    color:white;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
}

.btn-reservasi:hover{
    opacity:0.9;
}

#hasilQR{
    margin-top:30px;
    display:flex;
    justify-content:center;
}

.info{
    margin-top:20px;
    text-align:center;
    color:#666;
    font-size:14px;
}

</style>
</head>

<body>

<div class="reservasi-box">

    <a href="index.html" class="back-btn">
        ← Kembali ke Home
    </a>

    <h2>📅 Reservasi Meja Nara Café</h2>

    <form id="formReservasi">

        <div class="input-group">
            <label>Nama</label>
            <input type="text" id="nama" required>
        </div>

        <div class="input-group">
            <label>Nomor Telepon</label>
            <input type="tel" id="telepon" required>
        </div>

        <div class="input-group">
            <label>Jumlah Orang</label>
            <input type="number" id="orang" min="1" required>
        </div>

        <div class="input-group">
            <label>Tanggal Reservasi</label>
            <input type="date" id="tanggal" required>
        </div>

        <div class="input-group">
            <label>Jam Reservasi</label>
            <input type="time" id="jam" required>
        </div>

        <button type="submit" class="btn-reservasi">
            Buat Reservasi
        </button>

    </form>

    <div id="hasilQR"></div>

    <div class="info">
        Tunjukkan QR Code ini saat datang ke kafe.
    </div>

</div>

<!-- Library QR Code -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script>

/* WAJIB LOGIN DULU */
const userLogin = JSON.parse(localStorage.getItem("userLogin"));

if(!userLogin){
    alert("Silakan login terlebih dahulu untuk melakukan reservasi.");
    window.location.href = "login.html";
}

/* AUTO ISI NAMA JIKA SUDAH LOGIN */
if(userLogin){
    document.getElementById("nama").value =
        userLogin.nama || "";
}

/* FORM RESERVASI */
document.getElementById("formReservasi")
.addEventListener("submit", function(e){

    e.preventDefault();

    const reservasi = {
        nama: document.getElementById("nama").value,
        telepon: document.getElementById("telepon").value,
        orang: document.getElementById("orang").value,
        tanggal: document.getElementById("tanggal").value,
        jam: document.getElementById("jam").value
    };

    /* Simpan reservasi */
    localStorage.setItem(
        "reservasi",
        JSON.stringify(reservasi)
    );

    /* Bersihkan QR lama */
    document.getElementById("hasilQR").innerHTML = "";

    /* Buat QR Baru */
    new QRCode(
        document.getElementById("hasilQR"),
        {
            text:
`NARA CAFE
Nama: ${reservasi.nama}
Telepon: ${reservasi.telepon}
Jumlah Orang: ${reservasi.orang}
Tanggal: ${reservasi.tanggal}
Jam: ${reservasi.jam}`,
            width: 200,
            height: 200
        }
    );

    alert("Reservasi berhasil dibuat!");
});

</script>

</body>
</html>
